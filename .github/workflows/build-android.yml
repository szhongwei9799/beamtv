name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Accept licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Build APK
        run: |
          flutter build apk --debug
          echo "=== APK find ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo "=== outputs ==="
          ls -la build/app/outputs/ 2>/dev/null || echo "no outputs dir"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: beamtv-debug-apk
          path: |
            **/outputs/**/*.apk
          retention-days: 30
