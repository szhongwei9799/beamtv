name: beamtv
description: "BeamTV (光线传播) - 智能电视/大屏端流媒体聚合播放平台"
publish_to: 'none'
version: 1.2.0+12

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.2.0
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true